name: Build and deploy Node.js app to Azure Web App - TaskFlow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: npm install and build
        run: |
          npm install
          npm run build --if-present
          grep -o "supabase.co" dist/assets/*.js && echo "✅ URL embebida" || echo "❌ URL NO embebida"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}        # ← agregado
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}  # ← agregado

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist   # ← solo /dist, no todo el proyecto

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F94447E5F5324B32BE7958371CA63AB5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B7170FB7679044D7A907A5F3A68DE070 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C46C6112B04645ECB7249B4E18D5B27F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TaskFlow'
          slot-name: 'Production'
          package: .